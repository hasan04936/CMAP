<!DOCTYPE html>
<html lang="en">
<head>
    <title>System Setup - C-MAP</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .wizard-box { width: 800px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; display: flex; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .info-side { flex: 1; padding: 50px; color: white; display: flex; flex-direction: column; justify-content: center; background: rgba(0,0,0,0.2); border-right: 1px solid rgba(255,255,255,0.05); }
        .form-side { flex: 1.2; padding: 60px 50px; background: white; }
        .step-badge { background: #0ea5e9; color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; width: fit-content; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase;}
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 8px; text-transform: uppercase;}
        .form-group input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s;}
        .form-group input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        .submit-btn { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
    </style>
</head>
<body>
    <div class="wizard-box">
        <div class="info-side">
            <h1 style="margin: 0 0 10px 0; font-size: 35px; letter-spacing: 2px;">C-MAP<br>Installation</h1>
            <p style="color: #aaa; line-height: 1.6;">Welcome to your new Enterprise Management System. Let's initialize your secure database.</p>
        </div>
        <div class="form-side">
            <div class="step-badge">Step 1 of 2</div>
            <h2 style="margin: 0 0 25px 0; color: #1e293b; font-size: 26px;">Master Account</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group"><label>Admin Username</label><input type="text" name="username" required autocomplete="off"></div>
                <div class="form-group"><label>Master Password</label><input type="password" name="password" required autocomplete="new-password"></div>
                <button type="submit" class="submit-btn">Create System Key →</button>
            </form>
        </div>
    </div>
</body>
</html>
